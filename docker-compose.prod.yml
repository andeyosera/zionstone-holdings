# Production Docker Compose
# Optimized for security, performance and reliability

version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: zionstone-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    # NOT exposed to host in production — internal network only
    networks:
      - zionstone-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
      target: production    # Use lean production stage
    container_name: zionstone-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - zionstone-network
    # NOT exposed to host — only accessible via Nginx

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
      target: production
    container_name: zionstone-frontend-prod
    restart: always
    depends_on:
      - backend
    networks:
      - zionstone-network

  nginx:
    image: nginx:alpine
    container_name: zionstone-nginx-prod
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"     # HTTPS in production
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl    # SSL certificates
    networks:
      - zionstone-network

volumes:
  pgdata_prod:
    driver: local

networks:
  zionstone-network:
    driver: bridge